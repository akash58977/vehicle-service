<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | AutoCare AI</title>
  <meta name="description" content="Reset your AutoCare AI account password">
  <link rel="icon" href="{% static 'assets/AT-pro-logo.png' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      background: #020c18;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 30% 40%, rgba(124, 58, 237, 0.2) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 70% 25%, rgba(37, 99, 235, 0.18) 0%, transparent 60%),
        radial-gradient(ellipse 50% 70% at 50% 80%, rgba(0, 212, 255, 0.1) 0%, transparent 60%);
      animation: bgFloat 10s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes bgFloat {
      0%   { transform: scale(1) rotate(0deg); }
      100% { transform: scale(1.05) rotate(-1.5deg); }
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 36px 36px;
      pointer-events: none;
    }

    .wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 480px;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 52px 46px;
      box-shadow: 0 30px 90px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.07);
      animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .brand { text-align: center; margin-bottom: 36px; }

    .brand-icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 18px;
      box-shadow: 0 10px 36px rgba(124, 58, 237, 0.45);
    }

    .brand-icon i { font-size: 30px; color: #fff; }
    .brand h1 { font-size: 26px; font-weight: 700; color: #fff; margin-bottom: 8px; letter-spacing: -0.5px; }
    .brand p { font-size: 14px; color: rgba(255,255,255,0.45); line-height: 1.6; max-width: 280px; margin: auto; }

    .step-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .step-dot {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.4);
    }

    .step-dot.active {
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      border-color: transparent;
      color: white;
      box-shadow: 0 4px 15px rgba(124,58,237,0.4);
    }

    .step-dot.done {
      background: rgba(34,197,94,0.15);
      border-color: rgba(34,197,94,0.3);
      color: #22c55e;
    }

    .step-line {
      width: 50px; height: 2px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
    }

    .form-group { margin-bottom: 22px; }

    .form-group label {
      display: block; font-size: 12px; font-weight: 600;
      color: rgba(255,255,255,0.55); margin-bottom: 8px;
      letter-spacing: 0.8px; text-transform: uppercase;
    }

    .input-wrapper { position: relative; }

    .input-icon {
      position: absolute; left: 16px; top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.28); font-size: 15px;
      pointer-events: none; transition: color 0.3s;
    }

    .input-wrapper:focus-within .input-icon { color: #7c3aed; }

    .form-group input {
      width: 100%;
      padding: 14px 14px 14px 46px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 13px; color: #fff; font-size: 15px;
      font-family: 'Outfit', sans-serif; outline: none; transition: all 0.3s;
    }

    .form-group input:focus {
      background: rgba(255,255,255,0.08);
      border-color: rgba(124, 58, 237, 0.6);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
    }

    .form-group input::placeholder { color: rgba(255,255,255,0.25); }

    .btn-submit {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, #7c3aed 0%, #2563eb 100%);
      border: none; border-radius: 13px; color: #fff;
      font-size: 16px; font-weight: 700; font-family: 'Outfit', sans-serif;
      cursor: pointer; transition: all 0.3s;
      box-shadow: 0 10px 30px rgba(124, 58, 237, 0.35);
      display: flex; align-items: center; justify-content: center; gap: 10px;
      letter-spacing: 0.3px;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 40px rgba(124, 58, 237, 0.55);
    }

    .alert-error {
      padding: 12px 16px; border-radius: 12px; font-size: 14px;
      background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.25);
      color: #fca5a5; display: flex; align-items: center; gap: 10px;
      margin-bottom: 20px;
    }

    .alert-success {
      padding: 12px 16px; border-radius: 12px; font-size: 14px;
      background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.25);
      color: #86efac; display: flex; align-items: center; gap: 10px;
      margin-bottom: 20px;
    }

    .back-link {
      text-align: center;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .back-link a {
      color: rgba(255,255,255,0.4); font-size: 13px; text-decoration: none;
      display: inline-flex; align-items: center; gap: 7px; transition: color 0.3s;
    }

    .back-link a:hover { color: #7c3aed; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <div class="brand">
        <div class="brand-icon">
          <i class="fas fa-key"></i>
        </div>
        <h1>Forgot Password?</h1>
        <p>Enter your username to find your account and reset your password.</p>
      </div>

      <div class="step-indicator">
        <div class="step-dot active">1</div>
        <div class="step-line"></div>
        <div class="step-dot">2</div>
        <div class="step-line"></div>
        <div class="step-dot">3</div>
      </div>

      {% if error %}
      <div class="alert-error"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
      {% endif %}

      {% if success %}
      <div class="alert-success"><i class="fas fa-check-circle"></i> {{ success }}</div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label>Username</label>
          <div class="input-wrapper">
            <i class="fas fa-user input-icon"></i>
            <input type="text" name="username" placeholder="Enter your registered username" required autofocus>
          </div>
        </div>

        <button type="submit" class="btn-submit">
          <i class="fas fa-arrow-right"></i>
          Find My Account
        </button>
      </form>

      <div class="back-link">
        <a href="/customerlogin"><i class="fas fa-arrow-left"></i> Back to Login</a>
      </div>
    </div>
  </div>
</body>
</html>
