{% extends 'vehicle/customerbase.html' %}
{% load static %}
{% block content %}

<div class="form-container xyz" style="text-align: center;">
  <h3>Customer Profile</h3>
  
  {% if customer.profile_pic %}
  <img style="width: 150px; height: 150px; border-radius: 50%; margin: 0 auto 25px; display: block; object-fit: cover; border: 3px solid var(--primary-color);" src="{{ customer.profile_pic.url }}" alt="Profile Pic">
  {% else %}
  <div style="width: 150px; height: 150px; border-radius: 50%; background: var(--bg-color); color: var(--text-muted); display: flex; align-items: center; justify-content: center; font-size: 48px; margin: 0 auto 25px; border: 2px dashed var(--border-color);"><i class="fas fa-user"></i></div>
  {% endif %}

  <div class="card" style="text-align: left; padding: 20px; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 12px; margin-bottom: 25px;">
    <p style="font-size: 16px; margin-bottom: 12px; color: var(--text-secondary);"><strong>Name:</strong> {{customer.get_name}}</p>
    <p style="font-size: 16px; margin-bottom: 12px; color: var(--text-secondary);"><strong>Mobile:</strong> {{customer.mobile}}</p>
    <p style="font-size: 16px; color: var(--text-secondary);"><strong>Address:</strong> {{customer.address}}</p>
  </div>

  <a href="/edit-customer-profile" class="btn btn-primary" style="padding: 12px 30px; font-size: 15px; border-radius: 8px;">Edit Profile</a>
</div>
{% endblock content %}
