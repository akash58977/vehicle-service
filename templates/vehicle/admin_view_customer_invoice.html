{% extends 'vehicle/adminbase.html' %}
{% block content %}
<div class="wrapper">
  <div class="row">
    <div class="col-12 col-m-12 col-sm-12">
      <div class="card">
        <div class="card-header">
          <h3><i class="fas fa-file-invoice-dollar"></i> Customer Invoices (Total Sums)</h3>
        </div>
        <div class="card-content">
          <table>
            <thead>
              <tr>
                <th>Customer Name</th>
                <th>Total Cost Accumulated (₹)</th>
              </tr>
            </thead>
            <tbody>
              {% for c,r in data %}
              <tr>
                <td>{{ c.get_name }}</td>
                <td><strong>{{ r.cost__sum|default:"0" }}</strong></td>
              </tr>
              {% empty %}
              <tr>
                <td colspan="2" style="text-align:center; padding:40px; color:var(--text-muted);">
                  <i class="fas fa-inbox" style="font-size:32px; margin-bottom:10px; display:block;"></i>
                  No invoices available.
                </td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock content %}
