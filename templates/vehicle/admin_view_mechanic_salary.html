{% extends 'vehicle/adminbase.html' %}
{% block content %}
{% load static %}
<div class="wrapper">
  <div class="row">
    <div class="col-12 col-m-12 col-sm-12">
      <div class="card">
        <div class="card-header">
          <h3><i class="fas fa-wallet"></i> Mechanic Salaries</h3>
        </div>
        <div class="card-content">
          <table>
            <thead>
              <tr>
                <th>Mechanic Name</th>
                <th>Current Salary (₹)</th>
                <th style="text-align: center;">Actions</th>
              </tr>
            </thead>
            <tbody>
              {% for m in mechanics %}
              <tr>
                <td>{{ m.get_name }}</td>
                <td><strong>{{ m.salary|default:"0" }}</strong></td>
                <td style="text-align: center;">
                  <a class="btn btn-primary" href="{% url 'update-salary' m.id %}" style="padding: 6px 12px; font-size: 13px;">
                    <i class="fas fa-edit"></i> Update Salary
                  </a>
                </td>
              </tr>
              {% empty %}
              <tr>
                <td colspan="3" style="text-align:center; padding:40px; color:var(--text-muted);">
                  <i class="fas fa-inbox" style="font-size:32px; margin-bottom:10px; display:block;"></i>
                  No mechanics found.
                </td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock content %}
