{% extends 'vehicle/mechanicbase.html' %}
{% load static %}
{% block content %}

<div class="wrapper" style="display: flex; align-items: center; justify-content: center; min-height: 60vh;">
  <div style="text-align: center; max-width: 460px; padding: 20px;">

    <div style="width: 90px; height: 90px; border-radius: 50%; background: linear-gradient(135deg, #10b981, #059669); display: flex; align-items: center; justify-content: center; margin: 0 auto 28px; box-shadow: 0 12px 30px rgba(16, 185, 129, 0.4); animation: popIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;">
      <i class="fas fa-check" style="font-size: 38px; color: #fff;"></i>
    </div>

    <h2 style="font-size: 28px; font-weight: 800; color: var(--text-primary); margin-bottom: 12px;">
      Feedback Sent!
    </h2>

    <p style="font-size: 15px; color: var(--text-secondary); margin-bottom: 36px; line-height: 1.7;">
      Your feedback has been submitted successfully. The admin team will review it shortly.
    </p>

    <div style="display: flex; gap: 14px; justify-content: center; flex-wrap: wrap;">
      <a href="/mechanic-feedback" class="btn btn-primary" style="padding: 12px 28px; font-size: 14px;">
        <i class="fas fa-comment"></i> Send Another Feedback
      </a>
      <a href="/mechanic-dashboard" class="btn" style="padding: 12px 28px; font-size: 14px; background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-secondary);">
        <i class="fas fa-home"></i> Back to Dashboard
      </a>
    </div>

  </div>
</div>

<style>
  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
</style>

{% endblock content %}
