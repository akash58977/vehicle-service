<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Contact Us | AutoCare AI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body {
      background: #020817;
      color: #ffffff;
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .contact-section {
      padding: 100px 0 60px;
      flex: 1;
      display: flex;
      align-items: center;
    }
    .contact-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 45px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
    }
    .contact-card h2 {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(90deg, #00D4FF, #2563EB);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
      text-align: center;
    }
    .contact-card p.subtitle {
      color: #cbd5e1;
      font-size: 15px;
      margin-bottom: 34px;
      text-align: center;
    }
    .form-group label {
      font-size: 13px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .form-group input, .form-group textarea {
      background: rgba(255, 255, 255, 0.05) !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      color: white !important;
      border-radius: 10px !important;
      padding: 12px 18px !important;
      font-size: 15px !important;
      outline: none;
      transition: all 0.3s;
      width: 100%;
    }
    .form-group input:focus, .form-group textarea:focus {
      border-color: #00d4ff !important;
      box-shadow: 0 0 10px rgba(0,212,255,0.2) !important;
    }
    .submit-btn {
      width: 100%;
      background: linear-gradient(135deg, #2563EB, #00D4FF);
      color: white !important;
      font-weight: 700;
      padding: 14px 20px;
      border: none;
      border-radius: 10px;
      margin-top: 15px;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(0,198,255,0.3);
      transition: all 0.3s;
    }
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(0,198,255,0.5);
    }
    .marquee-container {
      background: rgba(255, 255, 255, 0.02);
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding: 20px 0;
      margin-bottom: 40px;
    }
    .marquee-container img {
      margin: 0 20px;
      filter: grayscale(100%) brightness(200%);
      transition: filter 0.3s;
    }
    .marquee-container img:hover {
      filter: grayscale(0%) brightness(100%);
    }
    /* Style Django default forms if as_p rendered */
    form p {
      margin-bottom: 15px;
    }
    form p label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    form p input, form p textarea {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 15px;
      outline: none;
      transition: all 0.3s;
      width: 100%;
    }
    form p input:focus, form p textarea:focus {
      border-color: #00d4ff;
      box-shadow: 0 0 10px rgba(0,212,255,0.2);
    }
  </style>
</head>
<body>
  {% include "vehicle/navbar.html" %}

  <div class="contact-section">
    <div class="container">
      <div class="contact-card">
        <h2>Contact AutoCare AI</h2>
        <p class="subtitle">Send us your feedback, questions, or requests</p>

        <form method="POST">
          {% csrf_token %}
          <div class="form-group">
            {{ form.as_p }}
            <input type="submit" value="Send Message" class="submit-btn">
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="marquee-container">
    <marquee behavior="scroll" direction="left" scrollamount="6">
      <img src="{% static "images/ferrari.png" %}" width="100" height="60" alt="ferrari" />
      <img src="{% static "images/ford.png" %}" width="100" height="60" alt="ford" />
      <img src="{% static "images/lambo.png" %}" width="100" height="60" alt="lambo" />
      <img src="{% static "images/mahindra.png" %}" width="100" height="60" alt="mahindra" />
      <img src="{% static "images/tvs.png" %}" width="100" height="60" alt="tvs" />
      <img src="{% static "images/tata.png" %}" width="100" height="60" alt="tata" />
      <img src="{% static "images/hero.png" %}" width="100" height="60" alt="hero" />
      <img src="{% static "images/rolls.png" %}" width="100" height="60" alt="rolls" />
      <img src="{% static "images/suzuki.png" %}" width="100" height="60" alt="suzuki" />
    </marquee>
  </div>

  {% include "vehicle/footer.html" %}
</body>
</html>
